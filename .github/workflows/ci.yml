name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: pre-commit/action@v3.0.1

  compile:
    name: Compile / ${{ matrix.config.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: NodeMCU (ESP8266)
            fqbn: esp8266:esp8266:nodemcuv2
            sketch: examples/NodeMCU/NodeMCU.ino
            platforms: |
              - name: esp8266:esp8266
                source-url: https://arduino.esp8266.com/stable/package_esp8266com_index.json
          - name: Arduino UNO
            fqbn: arduino:avr:uno
            sketch: examples/ArduinoEspWifiShield/ArduinoEspWifiShield.ino
            platforms: |
              - name: arduino:avr

    steps:
      - uses: actions/checkout@v6

      - name: Cache Arduino platforms and libraries
        uses: actions/cache@v5
        with:
          path: |
            ~/.arduino15/packages
            ~/Arduino/libraries
          key: ${{ runner.os }}-arduino-${{ matrix.config.fqbn }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-arduino-${{ matrix.config.fqbn }}-

      - name: Install EasyNTPClient library from source
        run: |
          rm -rf ~/Arduino/libraries/EasyNTPClient
          # mkdir -p ~/Arduino/libraries
          # ln -sf "$(pwd)" ~/Arduino/libraries/EasyNTPClient

      - name: Compile sketch
        uses: arduino/compile-sketches@v1
        with:
          fqbn: ${{ matrix.config.fqbn }}
          platforms: ${{ matrix.config.platforms }}
          sketch-paths: |
            - ${{ matrix.config.sketch }}
          libraries: |
            - source-path: ./src
              destination-name: EasyNTPClient
            - name: WiFiEsp

      - name: Install tree
        id: install-tree
        if: always() # Ensure this step runs even if previous steps fail
        run: sudo apt-get install -y tree

      - name: Show Arduino directory structure
        if: steps.install-tree.outcome == 'success' # Only run if tree was installed successfully
        run: tree -L 2 ~/Arduino
